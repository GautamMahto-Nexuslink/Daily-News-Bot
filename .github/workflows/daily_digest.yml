name: AI Daily Digest

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC
    - cron: "30 2 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Restore SQLite history
        uses: actions/cache@v4.2.3
        continue-on-error: true
        with:
          path: database/history.sqlite
          key: sqlite-history-${{ github.run_number }}
          restore-keys: sqlite-history-

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Cache Ollama model
        uses: actions/cache@v4.2.3
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-1.5b

      - name: Start Ollama server
        run: ollama serve &

      - name: Wait for Ollama to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready"
              break
            fi
            echo "Waiting for Ollama... ($i/30)"
            sleep 2
          done

      - name: Pull model (skipped if cached)
        run: ollama pull qwen2.5:1.5b

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          OLLAMA_ENABLED: "true"
          OLLAMA_MODEL: "qwen2.5:1.5b"
          OLLAMA_HOST: "http://localhost:11434"
          TOP_N_ARTICLES: "10"
          LOOKBACK_HOURS: "25"
        run: python3 main.py
